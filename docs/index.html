<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f0e4" />
    <title>ならべなおし | aptmara</title>
    <meta
      name="description"
      content="散らばった小物を、やわらかくつまんで元の位置へ戻す小さな整頓ゲーム。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Zen+Maru+Gothic:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="playtable">
      <header class="top-strip">
        <a class="mini-link" href="https://github.com/aptmara/aptmara"
          >aptmara / プロフィール</a
        >

        <div class="title-pack">
          <span class="sticker sticker-coral">整える</span>
          <h1>ならべなおし</h1>
        </div>

        <button id="start-button" class="action-button" type="button">
          はじめる
        </button>
      </header>

      <section class="stage-card">
        <div class="stage-head">
          <p class="hint-copy">
            ドラッグ / W A S D。長押し /
            スペースでつまむ。合う場所へ少し吸いつく。
          </p>

          <div class="meter-pill" aria-hidden="true">
            <span class="meter-label">そろい具合</span>
            <div class="meter-track">
              <span id="progress-bar"></span>
            </div>
          </div>

          <p id="state-text" class="state-copy">あと5つ</p>
        </div>

        <div class="canvas-wrap">
          <canvas
            id="game"
            width="960"
            height="640"
            aria-label="ならべなおしの操作画面"
          ></canvas>

          <div class="overlay" id="overlay">
            <div class="overlay-card">
              <p class="overlay-label">整頓ゲーム</p>
              <h2 id="overlay-title">ならべなおし</h2>
              <p id="overlay-copy">
                散らばった小物を戻します。ドラッグでも、W A S D
                とスペースでも動かせます。
              </p>
              <button id="overlay-button" class="action-button" type="button">
                はじめる
              </button>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer-strip">
        <div class="footer-notes">
          <span class="sticker sticker-blue">近づくと吸いつく</span>
          <span class="sticker sticker-cream">つまみやすく調整</span>
        </div>

        <a class="mini-link" href="https://github.com/aptmara/aptmara"
          >GitHub プロフィールへ戻る</a
        >
      </footer>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
