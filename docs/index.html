<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080604" />
    <title>シグナルループ | aptmara</title>
    <meta
      name="description"
      content="aptmara の GitHub プロフィールに置いた、触感重視のインタラクション。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="workbench">
      <header class="masthead">
        <div class="title-block">
          <a class="profile-link" href="https://github.com/aptmara/aptmara"
            >aptmara / プロフィール</a
          >
          <h1>シグナルループ</h1>
        </div>

        <button id="start-button" class="action-button" type="button">
          触る
        </button>
      </header>

      <section class="guidance-strip" aria-label="操作案内">
        <p class="guidance">
          ドラッグか W A S D。押しっぱなしでためる。離すと弾ける。
        </p>

        <div class="feel-strip" aria-hidden="true">
          <span class="feel-label">圧</span>
          <div class="feel-meter">
            <span id="charge-bar"></span>
          </div>
          <span id="state-text" class="state-text">まだ静か</span>
        </div>
      </section>

      <section class="stage-shell">
        <canvas
          id="game"
          width="960"
          height="600"
          aria-label="シグナルループの操作画面"
        ></canvas>

        <div class="overlay" id="overlay">
          <p class="overlay-label">触感試作</p>
          <h2 id="overlay-title">シグナルループ</h2>
          <p id="overlay-copy">押して、ためて、離す。反応だけ見てください。</p>
          <button id="overlay-button" class="action-button" type="button">
            触る
          </button>
        </div>
      </section>

      <footer class="control-strip">
        <p>操作: ドラッグ / マウス移動 / タッチ / W A S D / Space</p>
        <a class="profile-link" href="https://github.com/aptmara/aptmara"
          >GitHub プロフィールへ戻る</a
        >
      </footer>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
