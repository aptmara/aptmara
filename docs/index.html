<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050505" />
    <title>シグナルループ | aptmara</title>
    <meta
      name="description"
      content="aptmara の GitHub プロフィールに置いた、小さなブラウザゲーム。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="cabinet">
      <header class="masthead">
        <div class="title-block">
          <a class="profile-link" href="https://github.com/aptmara/aptmara"
            >aptmara / プロフィール</a
          >
          <h1>シグナルループ</h1>
        </div>

        <button id="start-button" class="start-button" type="button">
          開始
        </button>
      </header>

      <section class="status-strip" aria-label="ゲーム情報">
        <p class="rule-line">左右に動いてオレンジを拾う。灰色を避ける。</p>

        <dl class="metrics">
          <div class="metric">
            <dt>得点</dt>
            <dd id="score-value">0</dd>
          </div>
          <div class="metric">
            <dt>最高</dt>
            <dd id="best-value">0</dd>
          </div>
          <div class="metric">
            <dt>残り</dt>
            <dd><span id="time-value">60</span>s</dd>
          </div>
          <div class="metric metric-warning">
            <dt>耐久</dt>
            <dd id="lives-value">3</dd>
          </div>
        </dl>
      </section>

      <section class="stage-shell">
        <canvas
          id="game"
          width="720"
          height="480"
          aria-label="シグナルループのゲーム画面"
        ></canvas>

        <div class="overlay" id="overlay">
          <p class="overlay-label">隠しゲーム</p>
          <h2 id="overlay-title">シグナルループ</h2>
          <p id="overlay-copy">左右に動いて拾う。灰色は避ける。</p>
          <button id="overlay-button" class="start-button" type="button">
            開始
          </button>
        </div>
      </section>

      <footer class="control-strip">
        <p>操作: ← → / A D / マウス / タッチ</p>
        <a class="profile-link" href="https://github.com/aptmara/aptmara"
          >GitHub プロフィールへ戻る</a
        >
      </footer>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
