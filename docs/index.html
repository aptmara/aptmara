<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <title>SIGNAL LOOP | aptmara</title>
    <meta
      name="description"
      content="aptmara の GitHub プロフィールに隠した、小さなブラウザゲーム。"
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap"
      rel="stylesheet"
    >
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>

      <main class="layout">
        <section class="hero panel">
          <p class="eyebrow">隠しビルド // 遊べる試作</p>
          <h1>SIGNAL LOOP</h1>
          <p class="lede">
            オレンジのシグナルを集めて、灰色のノイズを避ける 60 秒の小さなゲームです。
            ゲームプログラマとしての「まず触って確かめる」感じを、そのまま置いています。
          </p>

          <div class="hero-actions">
            <button id="start-button" class="cta" type="button">開始する</button>
            <a class="ghost" href="https://github.com/aptmara/aptmara">プロフィールへ戻る</a>
          </div>

          <ul class="rules">
            <li><span>移動</span> 矢印キー / A D / マウス / タッチ</li>
            <li><span>シグナル</span> スコア +1、短い加速演出</li>
            <li><span>ノイズ</span> 安定度 -1、3 回で終了</li>
          </ul>
        </section>

        <section class="board panel">
          <div class="board-top">
            <div>
              <p class="eyebrow">プレイパネル</p>
              <h2>きれいなシグナルを拾う。</h2>
            </div>

            <div class="stats">
              <div class="stat">
                <span class="label">得点</span>
                <strong id="score-value">0</strong>
              </div>
              <div class="stat">
                <span class="label">最高</span>
                <strong id="best-value">0</strong>
              </div>
              <div class="stat">
                <span class="label">残り</span>
                <strong id="time-value">60</strong>
              </div>
              <div class="stat danger">
                <span class="label">安定度</span>
                <strong id="lives-value">3</strong>
              </div>
            </div>
          </div>

          <div class="canvas-frame">
            <canvas id="game" width="720" height="480" aria-label="SIGNAL LOOP のゲーム画面"></canvas>
            <div class="overlay" id="overlay">
              <p class="overlay-kicker">準備完了</p>
              <h3 id="overlay-title">SIGNAL LOOP</h3>
              <p id="overlay-copy">開始するを押してスタート。シグナルは拾って、ノイズは避ける。</p>
              <button id="overlay-button" class="cta" type="button">遊ぶ</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
