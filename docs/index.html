<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f0e4" />
    <title>シグナルループ | aptmara</title>
    <meta
      name="description"
      content="aptmara の GitHub プロフィールに置いた、さわり心地を見るための小さなページ。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Zen+Maru+Gothic:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="playtable">
      <header class="top-strip">
        <a class="mini-link" href="https://github.com/aptmara/aptmara"
          >aptmara / プロフィール</a
        >

        <div class="title-pack">
          <span class="sticker sticker-coral">さわるだけ</span>
          <h1>シグナルループ</h1>
        </div>

        <button id="start-button" class="action-button" type="button">
          さわる
        </button>
      </header>

      <section class="stage-card">
        <div class="stage-head">
          <p class="hint-copy">
            ドラッグ、タッチ、W A S D。長押しで少したまる。
          </p>

          <div class="meter-pill" aria-hidden="true">
            <span class="meter-label">たまり</span>
            <div class="meter-track">
              <span id="charge-bar"></span>
            </div>
          </div>

          <p id="state-text" class="state-copy">まだ静か</p>
        </div>

        <div class="canvas-wrap">
          <canvas
            id="game"
            width="960"
            height="640"
            aria-label="シグナルループの操作画面"
          ></canvas>

          <div class="overlay" id="overlay">
            <div class="overlay-card">
              <p class="overlay-label">触感試作</p>
              <h2 id="overlay-title">シグナルループ</h2>
              <p id="overlay-copy">
                ぷにっと引いて、離したときの返りだけを見ています。
              </p>
              <button id="overlay-button" class="action-button" type="button">
                さわる
              </button>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer-strip">
        <div class="footer-notes">
          <span class="sticker sticker-blue">やわらかく返る</span>
          <span class="sticker sticker-cream">机の上の小さなトイ</span>
        </div>

        <a class="mini-link" href="https://github.com/aptmara/aptmara"
          >GitHub プロフィールへ戻る</a
        >
      </footer>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
