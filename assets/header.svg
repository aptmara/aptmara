    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.16"/>
    </filter>
    <pattern id="microgrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0H0V16" stroke="#94A3B8" stroke-opacity="0.14" stroke-width="1"/>
