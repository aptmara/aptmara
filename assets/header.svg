<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">aptmara プロフィールヘッダー</title>
  <desc id="desc">日本語主体の工業調 GitHub プロフィールヘッダー。</desc>
  <defs>
    <linearGradient id="paper" x1="54" y1="30" x2="1160" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
    <linearGradient id="night" x1="768" y1="16" x2="1168" y2="304" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.16"/>
    </filter>
    <pattern id="microgrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0H0V16" stroke="#94A3B8" stroke-opacity="0.14" stroke-width="1"/>
    </pattern>
  </defs>

  <g filter="url(#shadow)">
    <rect x="16" y="16" width="1168" height="288" rx="30" fill="url(#paper)"/>
  </g>

  <rect x="16" y="16" width="1168" height="288" rx="30" fill="url(#microgrid)"/>
  <rect x="754" y="16" width="430" height="288" rx="30" fill="url(#night)"/>
  <path d="M716 16H780L692 304H628L716 16Z" fill="#F97316"/>
  <rect x="76" y="58" width="10" height="182" rx="5" fill="#F97316"/>
  <rect x="104" y="58" width="132" height="30" rx="15" fill="#0F172A"/>
  <text x="170" y="78" text-anchor="middle" fill="#F8FAFC" font-family="sans-serif" font-size="13" letter-spacing="1.4">プロフィール</text>

  <text x="104" y="140" fill="#0F172A" font-family="sans-serif" font-size="72" font-weight="700" letter-spacing="1.2">APTMA</text>
  <text x="104" y="188" fill="#1E293B" font-family="sans-serif" font-size="25" font-weight="700" letter-spacing="0.4">ゲーム制作 / ツール開発 / 遊べる試作</text>
  <rect x="104" y="214" width="372" height="4" rx="2" fill="#F97316"/>
  <text x="104" y="248" fill="#334155" font-family="sans-serif" font-size="18" letter-spacing="0.4">Unity + C# + C++ + 自動化</text>
  <text x="104" y="279" fill="#475569" font-family="sans-serif" font-size="15" letter-spacing="0.2">まず作り、触って確かめ、良かったものを残す。</text>

  <text x="814" y="62" fill="#CBD5E1" font-family="sans-serif" font-size="14" letter-spacing="0.4">最近つくっているもの</text>

  <rect x="814" y="84" width="308" height="56" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <circle cx="842" cy="112" r="6" fill="#F97316"/>
  <text x="862" y="108" fill="#F8FAFC" font-family="sans-serif" font-size="26" font-weight="700">ゲームの試作</text>
  <text x="862" y="128" fill="#CBD5E1" font-family="sans-serif" font-size="15">まず遊べるところまで作る</text>

  <rect x="814" y="152" width="308" height="56" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <circle cx="842" cy="180" r="6" fill="#F97316"/>
  <text x="862" y="176" fill="#F8FAFC" font-family="sans-serif" font-size="26" font-weight="700">デスクトップツール</text>
  <text x="862" y="196" fill="#CBD5E1" font-family="sans-serif" font-size="15">日々の作業を少し楽にする</text>

  <rect x="814" y="220" width="308" height="56" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <circle cx="842" cy="248" r="6" fill="#F97316"/>
  <text x="862" y="244" fill="#F8FAFC" font-family="sans-serif" font-size="26" font-weight="700">開発の自動化</text>
  <text x="862" y="264" fill="#CBD5E1" font-family="sans-serif" font-size="15">手作業を減らす仕組みを作る</text>

  <circle cx="1118" cy="48" r="10" fill="#F97316"/>
  <circle cx="1089" cy="48" r="5" fill="#E2E8F0" fill-opacity="0.9"/>
