<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">aptmara profile header</title>
  <desc id="desc">Industrial editorial style banner for aptmara GitHub profile.</desc>
  <defs>
